<div class="dialog-header">
  <div class="dialog-header__icon">
    <mat-icon>person</mat-icon>
  </div>
  <div class="dialog-header__text">
    <h2 class="dialog-header__title">
      {{ data.mode === 'create' ? 'Nuevo usuario' : 'Editar usuario' }}
    </h2>
    <p class="dialog-header__sub">
      {{ data.mode === 'create' ? 'Completa los campos para crear el usuario' : 'Modifica los datos del usuario' }}
    </p>
  </div>
</div>

<mat-dialog-content class="dialog-body">
  <form [formGroup]="form" class="form-grid">

    <div class="field-group">
      <label class="field-label">Nombre</label>
      <mat-form-field appearance="outline" class="field-full">
        <input matInput formControlName="nombre" placeholder="Ej: Juan" />
        <mat-error>El nombre es requerido</mat-error>
      </mat-form-field>
    </div>

    <div class="field-group">
      <label class="field-label">Apellidos</label>
      <mat-form-field appearance="outline" class="field-full">
        <input matInput formControlName="apellidos" placeholder="Ej: Pérez García" />
        <mat-error>Los apellidos son requeridos</mat-error>
      </mat-form-field>
    </div>

    <div class="field-group">
      <label class="field-label">Teléfono</label>
      <mat-form-field appearance="outline" class="field-full">
        <input matInput formControlName="telefono" placeholder="Ej: 3001234567" />
      </mat-form-field>
    </div>

    <div class="field-group">
      <label class="field-label">Tipo de usuario</label>
      <mat-form-field appearance="outline" class="field-full">
        <input matInput formControlName="tipo_usuario" placeholder="Ej: Administrador" />
      </mat-form-field>
    </div>

    <div class="field-group span-2">
      <label class="field-label">Nombre de usuario</label>
      <mat-form-field appearance="outline" class="field-full">
        <input matInput formControlName="nombre_usuario" autocomplete="username" placeholder="Ej: juan.perez" />
        <mat-error>El nombre de usuario es requerido</mat-error>
      </mat-form-field>
    </div>

    <div class="field-group span-2">
      <label class="field-label">
        Contraseña
        @if (data.mode === 'edit') {
          <span class="optional">· Dejar vacío para no cambiar</span>
        }
      </label>
      <mat-form-field appearance="outline" class="field-full">
        <input matInput type="password" formControlName="clave" autocomplete="current-password" />
      </mat-form-field>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions class="dialog-actions">
  <button mat-button type="button" class="btn-cancel" (click)="cancel()">
    Cancelar
  </button>
  <button mat-flat-button color="primary" type="button" class="btn-save" (click)="save()">
    <mat-icon>check</mat-icon>
    {{ data.mode === 'create' ? 'Crear usuario' : 'Guardar cambios' }}
  </button>
</mat-dialog-actions>

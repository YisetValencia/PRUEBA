<h2 mat-dialog-title>{{ data.mode === 'create' ? 'Nueva reserva' : 'Editar reserva' }}</h2>

<mat-dialog-content class="dialog-body">
  <form [formGroup]="form" class="grid">

    <mat-form-field appearance="outline" class="span-2">
      <mat-label>ID Habitación</mat-label>
      <input matInput formControlName="id_habitacion" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="span-2">
      <mat-label>ID Usuario</mat-label>
      <input matInput formControlName="id_usuario" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Fecha entrada</mat-label>
      <input matInput type="date" formControlName="fecha_entrada" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Fecha salida</mat-label>
      <input matInput type="date" formControlName="fecha_salida" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="span-2">
      <mat-label>Número de personas</mat-label>
      <input matInput type="number" formControlName="numero_de_personas" />
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancelar</button>
  <button mat-flat-button color="primary" type="button" (click)="save()">Guardar</button>
</mat-dialog-actions>

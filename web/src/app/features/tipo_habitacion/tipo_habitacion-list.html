<div class="page-head">
  <h1>Tipos de Habitación</h1>
  <button mat-flat-button color="primary" type="button" (click)="nuevo()">
    <mat-icon>add</mat-icon>
    Nuevo Tipo
  </button>
</div>

@if (loading) {
  <div class="loading">
    <mat-spinner />
  </div>
} @else {
  <div class="table-wrap mat-elevation-z2">
    <table mat-table [dataSource]="dataSource">
      
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let r">{{ r.nombre_tipo }}</td>
      </ng-container>

      <ng-container matColumnDef="descripcion">
        <th mat-header-cell *matHeaderCellDef>Descripción</th>
        <td mat-cell *matCellDef="let r" class="text-truncate">{{ r.descripcion || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r" class="actions">
          <button mat-icon-button type="button" (click)="editar(r)" title="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button type="button" (click)="eliminar(r)" title="Eliminar">
            <mat-icon color="warn">delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons />
  </div>
}

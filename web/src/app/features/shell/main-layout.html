<mat-sidenav-container
  #sidenavShell="matSidenavContainer"
  class="shell"
  autosize
>
  <mat-sidenav
    mode="side"
    opened
    class="nav-rail"
    [class.collapsed]="sidebarCollapsed()"
    [style.width]="sidebarCollapsed() ? '72px' : '268px'"
  >
    <div class="nav-brand">
      <div class="nav-brand__mark">
        <mat-icon class="nav-brand__icon">hub</mat-icon>
      </div>
      @if (!sidebarCollapsed()) {
        <div class="nav-brand__text">
          <span class="nav-brand__title">Gestión</span>
          <span class="nav-brand__sub">API trazabilidad</span>
        </div>
      }
    </div>
    <mat-nav-list class="nav-list">
      @for (item of nav; track item.path) {
        <a
          mat-list-item
          class="nav-item"
          [routerLink]="item.path"
          routerLinkActive="active-link"
          [matTooltip]="sidebarCollapsed() ? item.label : ''"
          matTooltipPosition="right"
          [matTooltipDisabled]="!sidebarCollapsed()"
        >
          <mat-icon matListItemIcon class="nav-item__icon">{{ item.icon }}</mat-icon>
          <span matListItemTitle class="nav-label">{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content class="main-column">
    <mat-toolbar class="top-bar">
      <button
        mat-icon-button
        type="button"
        class="menu-toggle"
        (click)="toggleSidebar()"
        aria-label="Alternar menú lateral"
      >
        <mat-icon>menu</mat-icon>
      </button>
      <span class="title">PANEL HOTEL</span>
      <span class="spacer"></span>

      <!-- Usuario logueado -->
      <div class="current-user">
        <div class="current-user__avatar">
          <mat-icon>person</mat-icon>
        </div>
        @if (currentUserName()) {
          <span class="current-user__name">{{ currentUserName() }}</span>
        }
      </div>

      <button mat-icon-button type="button" (click)="logout()" aria-label="Cerrar sesión">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>
    <main class="content">
      <div class="content-inner">
        <router-outlet />
      </div>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>

<div class="dialog-header">
  <div class="dialog-header__icon">
    <mat-icon>add_business</mat-icon>
  </div>
  <div class="dialog-header__text">
    <h2 class="dialog-header__title">
      {{ data.mode === 'create' ? 'Nuevo Servicio' : 'Editar Servicio' }}
    </h2>
    <p class="dialog-header__sub">
      {{ data.mode === 'create' ? 'Completa los campos para agregar un servicio' : 'Modifica los datos del servicio' }}
    </p>
  </div>
</div>

<mat-dialog-content class="dialog-body">
  <form [formGroup]="form" class="form-stack">

    <div class="field-group">
      <label class="field-label">Nombre del servicio</label>
      <mat-form-field appearance="outline" class="field-full">
        <input
          matInput
          formControlName="nombre_servicio"
          placeholder="Ej: Spa con masaje"
        />
        <mat-error>El nombre es requerido</mat-error>
      </mat-form-field>
    </div>

    <div class="field-group">
      <label class="field-label">Precio</label>
      <mat-form-field appearance="outline" class="field-full">
        <span matTextPrefix class="prefix">$&nbsp;</span>
        <input
          matInput
          type="number"
          step="0.01"
          min="0"
          formControlName="precio"
          placeholder="0"
        />
        <mat-error>Ingresa un precio válido</mat-error>
      </mat-form-field>
    </div>

    <div class="field-group">
      <label class="field-label">Descripción</label>
      <mat-form-field appearance="outline" class="field-full">
        <textarea
          matInput
          rows="3"
          formControlName="descripcion"
          placeholder="Describe brevemente el servicio..."
        ></textarea>
      </mat-form-field>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions class="dialog-actions">
  <button mat-button type="button" class="btn-cancel" (click)="cancel()">
    Cancelar
  </button>
  <button
    mat-flat-button
    type="button"
    class="btn-save"
    [disabled]="form.invalid"
    (click)="save()"
  >
    <mat-icon>check</mat-icon>
    {{ data.mode === 'create' ? 'Crear servicio' : 'Guardar cambios' }}
  </button>
</mat-dialog-actions>

<div class="page-head">
  <h1>Categorías</h1>
  <div class="page-head__actions">
    <mat-form-field appearance="outline" class="search-field" subscriptSizing="dynamic">
      <mat-icon matIconPrefix>search</mat-icon>
      <input matInput (input)="filtrar($any($event.target).value)" placeholder="Buscar por nombre..." />
    </mat-form-field>
    <button mat-flat-button color="primary" type="button" (click)="nuevo()">
      <mat-icon>add</mat-icon>
      Nueva
    </button>
  </div>
</div>

@if (loading) {
  <div class="loading">
    <mat-spinner />
  </div>
} @else {
  <div class="table-wrap mat-elevation-z2">
    <table mat-table [dataSource]="dataSource">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let r">{{ r.nombre_servicio }}</td>
      </ng-container>
      <ng-container matColumnDef="precio">
        <th mat-header-cell *matHeaderCellDef>Precio</th>
        <td mat-cell *matCellDef="let r">{{ r.precio | currency:'COP':'symbol':'1.0-0' }}</td>
      </ng-container>
      <ng-container matColumnDef="descripcion">
        <th mat-header-cell *matHeaderCellDef>Descripción</th>
        <td mat-cell *matCellDef="let r">{{ r.descripcion || '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r" class="actions">
          <button mat-icon-button type="button" (click)="editar(r)" aria-label="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button type="button" (click)="eliminar(r)" aria-label="Eliminar" class="action-delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons />
  </div>
}

<div class="page-head">
  <h1>Habitaciones</h1>
  <button mat-flat-button color="primary" type="button" (click)="nuevo()">
    <mat-icon>add</mat-icon>
    Nueva
  </button>
</div>

@if (loading) {
  <div class="loading">
    <mat-spinner />
  </div>
} @else {
  <div class="table-wrap mat-elevation-z2">
    <table mat-table [dataSource]="dataSource">

      <ng-container matColumnDef="numero">
        <th mat-header-cell *matHeaderCellDef>N°</th>
        <td mat-cell *matCellDef="let r">
          <span class="numero-badge">{{ r.numero }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="tipo">
        <th mat-header-cell *matHeaderCellDef>Tipo</th>
        <td mat-cell *matCellDef="let r">{{ nombreTipo(r.id_tipo) }}</td>
      </ng-container>

      <ng-container matColumnDef="precio">
        <th mat-header-cell *matHeaderCellDef>Precio / noche</th>
        <td mat-cell *matCellDef="let r">
          {{ r.precio | currency:'COP':'symbol':'1.0-0' }}
        </td>
      </ng-container>

      <ng-container matColumnDef="disponibilidad">
        <th mat-header-cell *matHeaderCellDef>Estado</th>
        <td mat-cell *matCellDef="let r">
          <span class="estado-badge" [class.disponible]="r.disponibilidad" [class.ocupada]="!r.disponibilidad">
            <span class="estado-dot"></span>
            {{ r.disponible ? 'Disponible' : 'Ocupada' }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r" class="actions">
          <button mat-icon-button type="button" (click)="editar(r)" aria-label="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button type="button" (click)="eliminar(r)" aria-label="Eliminar" class="action-delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons />
  </div>
}

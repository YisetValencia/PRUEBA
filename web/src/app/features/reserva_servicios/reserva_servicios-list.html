<div class="page-head">
  <h1>Servicios de Reserva</h1>
  <button mat-flat-button color="primary" type="button" (click)="nuevo()">
    <mat-icon>add</mat-icon>
    Agregar
  </button>
</div>

@if (loading) {
  <div class="loading">
    <mat-spinner />
  </div>
} @else {
  <div class="table-wrap mat-elevation-z2">
    <table mat-table [dataSource]="dataSource">

      <ng-container matColumnDef="servicio">
        <th mat-header-cell *matHeaderCellDef>Servicio</th>
        <td mat-cell *matCellDef="let r">{{ nombreServicio(r.id_servicios) }}</td>
      </ng-container>

      <ng-container matColumnDef="cantidad">
        <th mat-header-cell *matHeaderCellDef>Cantidad</th>
        <td mat-cell *matCellDef="let r">{{ r.cantidad }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r" class="actions">
          <button mat-icon-button type="button" (click)="editar(r)" aria-label="Editar">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button type="button" (click)="eliminar(r)" aria-label="Eliminar" class="action-delete">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
    <mat-paginator [pageSizeOptions]="[5, 10, 25]" showFirstLastButtons />
  </div>
}
